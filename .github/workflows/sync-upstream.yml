name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Sync main & rebase main-fork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main-fork
        uses: actions/checkout@v4
        with:
          ref: main-fork
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/buresdv/Cork.git
          git fetch upstream main
          git fetch origin main main-fork

      - name: Check whether upstream has new commits
        id: check
        run: |
          upstream_sha=$(git rev-parse upstream/main)
          origin_main_sha=$(git rev-parse origin/main)
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          if [ "$upstream_sha" = "$origin_main_sha" ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
            echo "Already in sync with upstream/main ($upstream_sha)"
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "Upstream has moved: $origin_main_sha -> $upstream_sha"
          fi

      - name: Fast-forward main to upstream/main
        if: steps.check.outputs.needs_sync == 'true'
        run: |
          git checkout -B main origin/main
          git merge --ff-only upstream/main
          git push origin main

      - name: Rebase main-fork onto updated main
        if: steps.check.outputs.needs_sync == 'true'
        id: rebase
        continue-on-error: true
        run: |
          git checkout -B main-fork origin/main-fork
          git rebase upstream/main

      - name: Force-push rebased main-fork
        if: steps.check.outputs.needs_sync == 'true' && steps.rebase.outcome == 'success'
        run: git push --force-with-lease origin main-fork

      - name: Open issue on rebase conflict
        if: steps.check.outputs.needs_sync == 'true' && steps.rebase.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_SHA: ${{ steps.check.outputs.upstream_sha }}
        run: |
          git rebase --abort || true
          gh issue create \
            --title "Upstream sync: rebase conflict on main-fork" \
            --body "Automated sync could not rebase \`main-fork\` onto upstream/main at \`$UPSTREAM_SHA\`. Manual resolution needed.

          **Run:** $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID

          Resolve locally:
          \`\`\`
          git fetch upstream && git fetch origin
          git checkout main-fork && git rebase upstream/main
          # resolve conflicts, then:
          git push --force-with-lease origin main-fork
          \`\`\`"
